# Render Blueprint — defines the API web service.
#
# Usage:
#   1. Push this repo to GitHub.
#   2. In Render: New → Blueprint → pick this repo. Render reads this file
#      and provisions the service below.
#   3. Set the env vars listed under `envVars` that are marked `sync: false`
#      (Render won't create them for you — they're secrets).
#
# The Next.js front-end is NOT in here. Deploy it separately to Vercel and
# wire `NEXT_PUBLIC_API_ORIGIN` to the URL Render gives you for this service.
services:
  - type: web
    name: pocketdeck-api
    runtime: node
    plan: free
    region: frankfurt
    # The repo is a pnpm workspace; Render runs commands from the repo root.
    # `corepack pnpm` runs the pnpm version pinned in package.json's
    # `packageManager` field WITHOUT `corepack enable`, which fails on
    # Render's read-only filesystem (it tries to symlink into /usr/bin).
    buildCommand: corepack pnpm install --frozen-lockfile
    startCommand: corepack pnpm --filter @pocketdeck/api start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Stops Corepack from blocking on a download confirmation prompt
      # during Render's non-interactive build.
      - key: COREPACK_ENABLE_DOWNLOAD_PROMPT
        value: "0"
      - key: WEB_ORIGIN
        # Comma-separated. Replace with your real Vercel domain(s).
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: RATE_LIMIT_MAX
        value: "20"
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
